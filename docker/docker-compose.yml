services:
  db:
    container_name: lemon-colonies-db
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - lemcol_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  server:
    container_name: lemon-colonies
    image: lemon-colonies:latest
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:50434:50434"
    restart: unless-stopped

volumes:
  lemcol_db_data: