services:
  db:
    container_name: lemon-colonies-db
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - lemcol_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  server:
    container_name: lemon-colonies
    image: lemon-colonies:latest
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "127.0.0.1:50434:50434"
    restart: unless-stopped
    networks:
      - default

  server-dev:
    container_name: lemon-colonies
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    env_file: [ .env ]
    ports:
      - "127.0.0.1:50434:50434"
      - "127.0.0.1:9091:9091"
    volumes:
      - ..:/build
      - lemcol_cargo_target:/build/target
      - lemcol_cargo_registry:/usr/local/cargo/registry
    depends_on:
      db: { condition: service_healthy }
    init: true
    command: >-
      cargo watch -w core -w server -w app --delay 10
      -s "cargo build --bin lemon-colonies-server
      && cargo build --release --target wasm32-unknown-unknown -p lemon-colonies-app
      && mkdir -p /tmp/static
      && cp target/wasm32-unknown-unknown/release/lemon-colonies-app.wasm /tmp/static/
      && cp app/index.html /tmp/static/
      && cp -r app/public /tmp/static/
      && exec cargo run --bin lemon-colonies-server"
    environment:
      - STATIC_DIR=/tmp/static
    profiles: [ dev ]

  postgres-exporter:
    container_name: lemon-colonies-postgres-exporter
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    env_file:
      - .env
    networks:
      - default

  prometheus:
    container_name: lemon-colonies-prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lemcol_prometheus_data:/prometheus
    networks:
      - default

  grafana:
    container_name: lemon-colonies-grafana
    image: grafana/grafana:latest
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - lemcol_grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - default

volumes:
  lemcol_db_data:
  lemcol_prometheus_data:
  lemcol_grafana_data:
  lemcol_cargo_target:
  lemcol_cargo_registry: